# Server
server.port=8080

# Database (falls back to local defaults if env vars not set)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fitnessjournal}
spring.datasource.username=${DB_USERNAME:fjuser}
spring.datasource.password=${DB_PASSWORD:fjpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - validate means Hibernate checks schema matches but never modifies it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:local-dev-secret-key-change-in-production-min-32-chars}
jwt.expiration-ms=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always